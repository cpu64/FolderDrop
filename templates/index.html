<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolderDrop</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='FolderDrop-icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='index_style.css') }}">
    <script src="https://unpkg.com/htmx.org"></script>
    <script src="{{ url_for('scripts', filename='rightclick.js') }}" defer></script>
</head>
<body>
    <h1>Directory Contents</h1>
    <form method="POST">
        <div id="table-container" hx-get="{{ url_for('load_table') }}" hx-trigger="load">
            <!-- The table will be dynamically loaded here -->
        </div>
    </form>

    <div id="contextMenu" class="context-menu">
        <ul>
            <li id="download">Download</li>
            <li id="rename">Rename</li>
            <li id="delete">Delete</li>
        </ul>
    </div>
</body>
</html>
